<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JG Producciones</title>
  <meta name="description" content="Producción técnica para eventos: bodas, conciertos y eventos corporativos con pantallas LED, sonido e iluminación de alto nivel." />

  <!--
    ESTADO DE CARGA (antes de React)
    ─────────────────────────────────
    Cuando #root está vacío (React aún no montó), el pseudo-elemento ::before
    muestra la imagen de fondo del hero instantáneamente — sin esperar JS/bundle.
    Al montar React, #root ya no está vacío y el pseudo-elemento desaparece.
    
    Esto elimina el "negro 1-2 segundos" que el usuario ve mientras el bundle
    de 414 kB descarga y parsea en móvil.
    
    La imagen hero1.webp (13 kB) debe estar en /public/images/ para tener
    una URL estable (sin hash) navegable desde CSS en index.html.
  -->
  <style>
    /* Reset mínimo para el estado de carga */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050607; overflow: hidden; }
    #root { width: 100%; height: 100%; }

    /* ── Loading screen: visible SOLO mientras React no ha montado ── */
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050607 url('/images/hero1.webp') center / cover no-repeat;
      height: 100vh;
      height: 100dvh;
    }

    /* Spinner sutil centrado encima del hero */
    #root:empty::after {
      content: '';
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(163, 255, 0, 0.2);
      border-top-color: #a3ff00;
      border-radius: 50%;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: translateX(-50%) rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
